services:
  # --- MASTER ---
  pg_primary:
    image: postgres:15
    container_name: pg_primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gr00sha207
      POSTGRES_DB: course_db
    ports:
      - "5433:5432"
    volumes:
      - ./init-master.sh:/docker-entrypoint-initdb.d/init-master.sh
      - pgdata_primary:/var/lib/postgresql/data
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
      -c shared_preload_libraries=pg_stat_statements
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- ВЕДОМЫЙ УЗЕЛ 1 ---
  pg_replica_1:
    image: postgres:15
    container_name: pg_replica_1
    depends_on:
      pg_primary:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_MASTER_HOST: pg_primary
      POSTGRES_MASTER_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gr00sha207
    volumes:
      - ./docker-entrypoint-replica.sh:/usr/local/bin/docker-entrypoint-replica.sh
      - pgdata_replica_1:/var/lib/postgresql/data
    entrypoint: ["/usr/local/bin/docker-entrypoint-replica.sh"]
    ports:
      - "5434:5432"
    networks:
      - postgres_network

  # --- ВЕДОМЫЙ УЗЕЛ 2 ---
  pg_replica_2:
    image: postgres:15
    container_name: pg_replica_2
    depends_on:
      pg_primary:
        condition: service_healthy
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_MASTER_HOST: pg_primary
      POSTGRES_MASTER_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gr00sha207
    volumes:
      - ./docker-entrypoint-replica.sh:/usr/local/bin/docker-entrypoint-replica.sh
      - pgdata_replica_2:/var/lib/postgresql/data
    entrypoint: ["/usr/local/bin/docker-entrypoint-replica.sh"]
    ports:
      - "5435:5432"
    networks:
      - postgres_network

  flyway:
    image: flyway/flyway:latest
    container_name: flyway
    depends_on:
      pg_primary:
        condition: service_healthy
    command:
      - "migrate"
    volumes:
      - ./db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://pg_primary:5432/course_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: gr00sha207
      FLYWAY_SCHEMAS: public
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_CLEAN_DISABLED: "false"
    networks:
      - postgres_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: daniargarafiev6@gmail.com
      PGADMIN_DEFAULT_PASSWORD: gr00sha207
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - pg_primary
    networks:
      - postgres_network
    restart: unless-stopped

  # --- POSTGRES EXPORTER ---
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:gr00sha207@pg_primary:5432/course_db?sslmode=disable"
    volumes:
      - ./queries.yaml:/queries.yaml:ro
    command:
      - "--extend.query-path=/queries.yaml"
      - "--collector.stat_statements"
      - "--collector.stat_statements.query_length=300"
      - "--collector.stat_statements.limit=500"
    ports:
      - "9187:9187"
    depends_on:
      pg_primary:
        condition: service_healthy
    networks:
      - postgres_network
    restart: unless-stopped

  # --- PROMETHEUS ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - postgres_exporter
    networks:
      - postgres_network
    restart: unless-stopped

  # --- GRAFANA ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    depends_on:
      - prometheus
    networks:
      - postgres_network
    restart: unless-stopped

volumes:
  pgdata_primary:
  pgdata_replica_1:
  pgdata_replica_2:
  prometheus_data:
  grafana_data:

networks:
  postgres_network:
    driver: bridge
    name: postgres_monitoring_network



