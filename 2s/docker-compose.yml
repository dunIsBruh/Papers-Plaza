version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: pg_course
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gr00sha207
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway
    depends_on:
      postgres:
        condition: service_healthy
    command: 
      - "migrate"
    volumes:
      - ./db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/course_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: gr00sha207
      FLYWAY_SCHEMAS: public 

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: daniargarafiev6@gmail.com
      PGADMIN_DEFAULT_PASSWORD: gr00sha207
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pg_data: